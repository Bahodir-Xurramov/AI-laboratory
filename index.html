<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kutubxona AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="ai-bg"></div>
    <div class="dark-overlay"></div>
    <canvas id="scene"></canvas>

    <button class="enter-hotspot" id="openPrivacy" aria-label="Enter Kutubxona AI"></button>

    <div class="privacy-modal" id="privacyModal">
        <div class="privacy-box">
            <h2>Privacy Policy</h2>
            <p>
                To continue, you agree that Kutubxona AI may use your input to provide library and AI assistance features.
            </p>

            <div class="privacy-actions">
                <button id="cancelPrivacy">Cancel</button>
                <button id="agreePrivacy">Yes, I agree</button>
            </div>
        </div>
    </div>

    <nav class="navbar">
        <span class="top-logo">Smart Library</span>
    </nav>

    <header class="hero-section">
        <div class="hero-content">
            <h1>Kutubxona AI</h1>
        </div>
    </header>

    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
    <script src="script.js"></script>

</body>
</html>
